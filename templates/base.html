<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Claude Proxy{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body { background: #f8f9fa; }
    .sidebar { min-height: 100vh; background: #212529; }
    .sidebar a { color: #adb5bd; text-decoration: none; }
    .sidebar a:hover, .sidebar a.active { color: #fff; }
    .nav-link { padding: .5rem 1rem; }
    .stat-card { border-left: 4px solid; }
    .stat-card.blue { border-left-color: #0d6efd; }
    .stat-card.green { border-left-color: #198754; }
    .stat-card.yellow { border-left-color: #ffc107; }
    .stat-card.red { border-left-color: #dc3545; }
    .badge-available { background: #198754; }
    .badge-rate_limited { background: #ffc107; color: #000; }
    .badge-banned { background: #dc3545; }
    .badge-disabled { background: #6c757d; }
    pre { background: #212529; color: #f8f9fa; padding: 1rem; border-radius: .5rem; }
  </style>
</head>
<body>
{% if show_sidebar %}
<div class="d-flex">
  <div class="sidebar p-3" style="width:220px;min-width:220px">
    <div class="text-white fw-bold mb-4 fs-5">⚡ Claude Proxy</div>
    <div id="adminNav" style="display:{% if is_admin %}block{% else %}none{% endif %}">
      <div class="text-muted small mb-2 text-uppercase">Admin</div>
      <a href="/ui/admin/dashboard" class="nav-link {% if active=='dashboard' %}active text-white{% endif %}">Dashboard</a>
      <a href="/ui/admin/accounts" class="nav-link {% if active=='accounts' %}active text-white{% endif %}">Accounts</a>
      <a href="/ui/admin/users" class="nav-link {% if active=='users' %}active text-white{% endif %}">Users</a>
      <hr class="border-secondary"/>
    </div>
    <div class="text-muted small mb-2 text-uppercase">User</div>
    <a href="/ui/user/usage" class="nav-link {% if active=='usage' %}active text-white{% endif %}">My Usage</a>
    <hr class="border-secondary"/>
    <a href="#" class="nav-link text-danger" id="logoutBtn">Logout</a>
  </div>
  <div class="flex-grow-1 p-4">
{% endif %}

{% block content %}{% endblock %}

{% if show_sidebar %}
  </div>
</div>
{% endif %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
const API_BASE = '';
const token = () => localStorage.getItem('access_token');

// Show admin nav synchronously from localStorage — no flicker
const adminNav = document.getElementById('adminNav');
if (adminNav && localStorage.getItem('user_role') === 'admin') {
  adminNav.style.display = 'block';
}

async function apiFetch(path, opts={}) {
  const headers = { 'Content-Type': 'application/json', ...opts.headers };
  if (token()) headers['Authorization'] = 'Bearer ' + token();
  const resp = await fetch(API_BASE + path, { ...opts, headers });
  if (resp.status === 401) { localStorage.removeItem('access_token'); location.href='/ui/login'; return null; }
  return resp;
}

document.getElementById('logoutBtn')?.addEventListener('click', e => {
  e.preventDefault();
  localStorage.removeItem('access_token');
  localStorage.removeItem('user_role');
  location.href = '/ui/login';
});
</script>
{% block scripts %}{% endblock %}
</body>
</html>
